appId: com.regent.desktop
productName: Regent
copyright: Copyright © 2026 Regent. All rights reserved.

win:
  target:
    - target: nsis
      arch: [x64]
    - target: zip
      arch: [x64]
  icon: assets/icon.ico

nsis:
  oneClick: false
  perMachine: false
  allowToChangeInstallationDirectory: true
  createDesktopShortcut: true
  createStartMenuShortcut: true
  shortcutName: Regent
  installerIcon: assets/icon.ico
  uninstallerIcon: assets/icon.ico

directories:
  output: release
  buildResources: assets

files:
  - dist/**/*
  - src/index.html
  - node_modules/**/*
  - package.json

npmRebuild: false

asarUnpack:
  - "**/node_modules/node-pty/**"

extraMetadata:
  main: dist/electron/main.js
