<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta http-equiv="Content-Security-Policy" content="default-src 'self'; style-src 'self' 'unsafe-inline'; script-src 'self'; connect-src https://api.github.com; img-src 'self' https://www.gravatar.com https://avatars.githubusercontent.com data:">
  <title>Runnio</title>
  <link rel="stylesheet" href="../dist/xterm.css">
  <style>
    :root {
      /* Text sizes */
      --text-xs: 11px;
      --text-sm: 12px;
      --text-base: 13px;
      --text-md: 14px;
      --text-lg: 16px;

      /* Weights */
      --weight-normal: 400;
      --weight-medium: 500;

      /* Spacing */
      --space-1: 4px;
      --space-2: 8px;
      --space-3: 12px;
      --space-4: 16px;
      --space-5: 20px;
      --space-6: 24px;

      /* Radii */
      --radius-sm: 4px;
      --radius-md: 6px;
      --radius-lg: 8px;
      --radius-xl: 12px;

      /* Text colors — Dark Navy default */
      --text-primary: #e6edf3;
      --text-secondary: #8b949e;
      --text-tertiary: #656d76;
      --text-disabled: #3d444d;

      /* Surface colors — Dark Navy default */
      --bg-app: #0d1117;
      --bg-surface: #161b22;
      --bg-elevated: #21262d;
      --bg-hover: #30363d;
      --bg-selected: #1a1f6e;

      /* Borders — Dark Navy default */
      --border-subtle: #21262d;
      --border-default: #30363d;
      --border-strong: #484f58;

      /* Accent */
      --accent: #6366f1;
      --accent-hover: #818cf8;

      /* Semantic */
      --working: #3fb950;
      --waiting: #d29922;
      --done: #818cf8;
      --idle: #656d76;
      --error: #f85149;
    }

    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    body {
      background-color: var(--bg-app);
      color: var(--text-primary);
      font-family: 'Inter', system-ui, -apple-system, sans-serif;
      overflow: hidden;
      -webkit-font-smoothing: antialiased;
    }

    #root {
      height: 100vh;
      width: 100vw;
    }

    ::-webkit-scrollbar {
      width: 6px;
    }
    ::-webkit-scrollbar-track {
      background: transparent;
    }
    ::-webkit-scrollbar-thumb {
      background: var(--text-disabled);
      border-radius: 3px;
    }
    ::-webkit-scrollbar-thumb:hover {
      background: var(--text-tertiary);
    }

    input:focus {
      border-color: var(--accent) !important;
    }

    @keyframes pulse {
      0%, 100% { opacity: 1; }
      50% { opacity: 0.4; }
    }

    @keyframes pulseFast {
      0%, 100% { opacity: 1; }
      50% { opacity: 0.5; }
    }

    @keyframes fadeIn {
      from { opacity: 0; transform: translateY(-8px); }
      to { opacity: 1; transform: translateY(0); }
    }

    @keyframes fadeOut {
      from { opacity: 1; transform: translateY(0); }
      to { opacity: 0; transform: translateY(4px); }
    }

    @keyframes slideInRight {
      from { opacity: 0; transform: translateX(100%); }
      to { opacity: 1; transform: translateX(0); }
    }

    @keyframes slideOutRight {
      from { opacity: 1; transform: translateX(0); }
      to { opacity: 0; transform: translateX(100%); }
    }

    @keyframes cloneProgress {
      0% { width: 10%; margin-left: 0; }
      50% { width: 60%; margin-left: 20%; }
      100% { width: 10%; margin-left: 90%; }
    }

    @keyframes statusChange {
      0% { transform: scale(1); }
      50% { transform: scale(1.3); }
      100% { transform: scale(1); }
    }

    @keyframes glowWaiting {
      0%, 100% { box-shadow: 0 0 0 rgba(251,191,36,0); }
      50% { box-shadow: 0 0 8px rgba(251,191,36,0.15); }
    }

    @keyframes pulsingBorder {
      0%, 100% { border-color: var(--waiting); box-shadow: 0 0 0 rgba(251,191,36,0); }
      50% { border-color: #fbbf2488; box-shadow: 0 0 10px rgba(251,191,36,0.2); }
    }

    @keyframes broadcastPulse {
      0%, 100% { border-color: #6366f144; }
      50% { border-color: #6366f1; }
    }

    kbd {
      font-family: Consolas, monospace;
    }
  </style>
</head>
<body>
  <div id="root"></div>
  <script src="../dist/renderer.js"></script>
</body>
</html>
